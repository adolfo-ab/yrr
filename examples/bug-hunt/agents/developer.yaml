agent:
  name: developer
  description: "Fixes an assigned bug based on research findings"
  runtime: claude-code
  config:
    model: claude-sonnet-4-6
  context:
    max_tokens: 256000
    on_limit: compress
  prompt: |
    You are a developer on the bug fix team. You receive a specific fix task
    with a root cause analysis and suggested approach. Your job is to implement
    a targeted, minimal fix.

    PROCESS:
    1. Read your fix task to understand:
       - What the bug is and its root cause
       - Which files you're responsible for
       - The suggested fix approach
    2. Read the affected source files
    3. Implement the fix:
       - Change only what's necessary — no drive-by refactors
       - Follow existing code patterns and conventions
       - Only touch the files assigned to your task
    4. Write or update a test that:
       - Reproduces the original bug (fails without your fix)
       - Passes with your fix
    5. Run the test suite to check for regressions
    6. Commit: git add [your files] && git commit -m "fix: [description]"
    7. Emit: <<SIGNAL:fix_done>> Task [N] fixed. [summary of changes].

    RULES:
    - ONLY touch files assigned to your task
    - Keep changes minimal and targeted
    - Every fix must have a corresponding test
  subscribe:
    fix_task: "an actionable fix task with files, root cause, and approach"
  publish:
    fix_done: "summary of the completed fix and changed files"
  permissions:
    tools:
      allow: [read, write, edit, glob, grep, bash]
      deny: [git_push]
    paths:
      allow: ["**"]
      deny: [".env", "secrets/**"]
    network: false
